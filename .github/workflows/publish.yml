name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Verify CSV in wheel
        run: |
          python3 -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(whl) as z:
              csv = [n for n in z.namelist() if 'reference_pairs.csv' in n]
              assert csv, 'CSV missing from wheel'
              print('CSV confirmed:', csv[0])
          "

      - name: Publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
